<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人格分裂指数测试</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 30px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.2);
        }

        .header p {
            font-size: 1.1em;
            opacity: 0.9;
        }

        .content {
            padding: 40px 30px;
        }

        /* 激活码页面 */
        .activation-page {
            text-align: center;
        }

        .activation-input {
            width: 100%;
            max-width: 400px;
            padding: 15px 20px;
            font-size: 1.2em;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            transition: border-color 0.3s;
        }

        .activation-input:focus {
            outline: none;
            border-color: #667eea;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.1em;
            border-radius: 10px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* 测试页面 */
        .test-page {
            display: none;
        }

        .progress-bar {
            background: #f0f0f0;
            border-radius: 10px;
            height: 10px;
            margin-bottom: 30px;
            overflow: hidden;
        }

        .progress-fill {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            height: 100%;
            transition: width 0.3s;
        }

        .question-number {
            color: #667eea;
            font-size: 0.9em;
            font-weight: 600;
            margin-bottom: 10px;
        }

        .question-text {
            font-size: 1.4em;
            color: #333;
            margin-bottom: 30px;
            line-height: 1.6;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .option {
            padding: 20px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: flex-start;
            gap: 15px;
        }

        .option:hover {
            border-color: #667eea;
            background: #f8f9ff;
        }

        .option.selected {
            border-color: #667eea;
            background: linear-gradient(135deg, rgba(102, 126, 234, 0.1) 0%, rgba(118, 75, 162, 0.1) 100%);
        }

        .option-letter {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            width: 35px;
            height: 35px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            flex-shrink: 0;
        }

        .option-text {
            flex: 1;
            color: #555;
            line-height: 1.5;
        }

        .next-btn {
            margin-top: 30px;
            width: 100%;
        }

        /* 结果页面 */
        .result-page {
            display: none;
            text-align: center;
        }

        .result-emoji {
            font-size: 5em;
            margin: 20px 0;
            animation: bounce 1s ease infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .result-score {
            font-size: 4em;
            font-weight: bold;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin: 10px 0;
        }

        .result-title {
            font-size: 2em;
            color: #333;
            margin-bottom: 20px;
        }

        .result-description {
            font-size: 1.1em;
            color: #666;
            line-height: 1.8;
            margin-bottom: 30px;
            padding: 20px;
            background: #f8f9ff;
            border-radius: 10px;
        }

        .result-details {
            text-align: left;
            background: #f8f9ff;
            padding: 20px;
            border-radius: 10px;
            margin: 20px 0;
        }

        .result-details h3 {
            color: #667eea;
            margin-bottom: 15px;
        }

        .result-details ul {
            list-style: none;
            padding-left: 0;
        }

        .result-details li {
            padding: 10px 0;
            border-bottom: 1px solid #e0e0e0;
            color: #555;
        }

        .result-details li:last-child {
            border-bottom: none;
        }

        .restart-btn {
            margin-top: 20px;
            background: #f0f0f0;
            color: #333;
        }

        .restart-btn:hover {
            background: #e0e0e0;
        }

        /* 错误提示 */
        .error-message {
            color: #e74c3c;
            background: #fdeaea;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            display: none;
        }

        .hidden {
            display: none !important;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🧠 人格分裂指数测试</h1>
            <p>探索你内心的多重人格面向</p>
        </div>

        <div class="content">
            <!-- 激活页面 -->
            <div class="activation-page" id="activationPage">
                <h2 style="margin-bottom: 20px; color: #333;">请输入激活码</h2>
                <p style="color: #666; margin-bottom: 20px;">联系管理员获取测试资格</p>
                <input type="text" class="activation-input" id="activationCode" placeholder="输入激活码" maxlength="20">
                <div class="error-message" id="errorMessage">激活码无效，请重新输入</div>
                <br>
                <button class="btn" onclick="activateTest()">开始测试</button>
            </div>

            <!-- 测试页面 -->
            <div class="test-page" id="testPage">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                </div>

                <div class="question-number" id="questionNumber">第 1 题 / 共 20 题</div>
                <div class="question-text" id="questionText">题目加载中...</div>

                <div class="options" id="optionsContainer">
                    <!-- 选项将通过 JS 动态生成 -->
                </div>

                <button class="btn next-btn" id="nextBtn" onclick="nextQuestion()" disabled>下一题</button>
            </div>

            <!-- 结果页面 -->
            <div class="result-page" id="resultPage">
                <div class="result-emoji" id="resultEmoji">🎭</div>
                <div class="result-score" id="resultScore">0</div>
                <div class="result-title" id="resultTitle">计算中...</div>
                <div class="result-description" id="resultDescription"></div>

                <button class="btn" onclick="restartTest()">重新测试</button>
            </div>
        </div>
    </div>

    <script>
        // 激活码列表
        const ACTIVATION_CODES = [
            '7k9G2sP5',
            '3mN8xR4t'
        ];

        // 测试题目
        const QUESTIONS = [
            {
                text: "在不同场合，你的性格表现会：",
                options: [
                    "始终如一，没什么变化",
                    "略有调整，但核心不变",
                    "明显不同，像变了一个人",
                    "完全不同，连自己都惊讶"
                ]
            },
            {
                text: "朋友对你的评价：",
                options: [
                    "很稳定，一直这样",
                    "大体一致，偶尔有变化",
                    "有时像不同的人",
                    "他们说我变化太大了"
                ]
            },
            {
                text: "面对压力时，你的反应：",
                options: [
                    "保持冷静，理性处理",
                    "有点紧张，但能应对",
                    "情绪波动明显",
                    "完全变成另一个人"
                ]
            },
            {
                text: "你是否有过'这不是我做的事'的感觉：",
                options: [
                    "从来没有",
                    "偶尔有过",
                    "经常有",
                    "频繁出现，很困扰"
                ]
            },
            {
                text: "你的兴趣爱好：",
                options: [
                    "长期稳定",
                    "基本稳定，偶有变化",
                    "经常变化",
                    "完全不同甚至矛盾"
                ]
            },
            {
                text: "在社交场合，你：",
                options: [
                    "表现一致",
                    "略有调整",
                    "像换了个人",
                    "完全融入不同角色"
                ]
            },
            {
                text: "你的说话方式：",
                options: [
                    "始终一致",
                    "基本一致",
                    "因场合变化大",
                    "完全不同风格"
                ]
            },
            {
                text: "是否有人说过你'变了个人'：",
                options: [
                    "从未说过",
                    "偶尔说过",
                    "经常说",
                    "几乎每次都这么说"
                ]
            },
            {
                text: "你的价值观和信念：",
                options: [
                    "非常稳定",
                    "基本稳定",
                    "有时会动摇",
                    "经常矛盾冲突"
                ]
            },
            {
                text: "回忆过去的自己，你感觉：",
                options: [
                    "就是同一个人",
                    "有些变化但连续",
                    "像不同的人",
                    "完全陌生"
                ]
            },
            {
                text: "做决定时，你：",
                options: [
                    "始终遵循同一套标准",
                    "大体一致，略有调整",
                    "经常犹豫矛盾",
                    "不同时候完全不同"
                ]
            },
            {
                text: "你的情绪状态：",
                options: [
                    "稳定平和",
                    "正常波动",
                    "起伏较大",
                    "极端变化"
                ]
            },
            {
                text: "是否感觉自己内心有'多个声音'：",
                options: [
                    "从来没有",
                    "偶尔有",
                    "经常有",
                    "一直存在"
                ]
            },
            {
                text: "面对同一件事，你的态度：",
                options: [
                    "始终一致",
                    "基本一致",
                    "可能改变",
                    "完全相反"
                ]
            },
            {
                text: "你的行为习惯：",
                options: [
                    "非常规律",
                    "基本规律",
                    "时有变化",
                    "毫无规律"
                ]
            },
            {
                text: "别人对你的第一印象和深入了解后：",
                options: [
                    "基本一致",
                    "有些差异",
                    "差异很大",
                    "判若两人"
                ]
            },
            {
                text: "你是否曾用不同名字或身份介绍自己：",
                options: [
                    "从未",
                    "偶尔开玩笑",
                    "有时认真使用",
                    "经常如此"
                ]
            },
            {
                text: "你的自我认知：",
                options: [
                    "清晰稳定",
                    "基本清晰",
                    "有时模糊",
                    "经常困惑"
                ]
            },
            {
                text: "是否有过'时间丢失'的经历（不记得做过某事）：",
                options: [
                    "从未",
                    "偶尔（如走神）",
                    "经常",
                    "频繁且时间长"
                ]
            },
            {
                text: "总体来说，你觉得自己：",
                options: [
                    "是统一完整的一个人",
                    "有多面性但核心一致",
                    "有时像不同的人",
                    "体内住着好几个'我'"
                ]
            }
        ];

        // 结果评级
        const RESULTS = {
            low: {
                emoji: "🏔️",
                title: "人格高度统一（0-30 分）",
                description: "你拥有非常稳定、统一的人格特质。无论面对什么场合、什么人，你都能保持相对一致的行为模式和价值观。这种人格统一性让你成为可靠、可预测的人——朋友知道可以信任你，同事知道你的行事风格。你的自我认知清晰，不会轻易因外界影响而动摇。这是一种健康的心理状态，说明你有稳定的核心自我。不过，适度的灵活性也是人际交往的重要能力，偶尔尝试跳出舒适区，可能会发现更多可能性。总的来说，你是一个'表里如一'的人，这种品质在当下社会尤为珍贵。"
            },
            medium: {
                emoji: "🎭",
                title: "健康多面性（31-45 分）",
                description: "你拥有正常、健康的人格多面性。就像大多数人一样，你能够根据不同情境调整自己的表现——在工作中专业严谨，在朋友面前轻松幽默，在家人身边温暖贴心。这种灵活性是社交智慧的体现，说明你具备良好的环境适应能力。重要的是，这些不同面向都服务于同一个核心自我，你不会因此感到困惑或分裂。你清楚地知道'我是谁'，只是在不同场合展现不同的侧面。这是最理想的状态之一：既有稳定性保证内心安宁，又有灵活性应对复杂世界。继续保持这种平衡，它会让你在各种关系中游刃有余。"
            },
            high: {
                emoji: "🌀",
                title: "多重面向明显（46-60 分）",
                description: "你的人格表现出明显的多面性特征。在不同情境下，你可能展现出差异很大的行为模式、情绪反应甚至价值观。有时连你自己都会惊讶：'那真的是我吗？'这种状态可能源于丰富的生活经历、多元的社交圈，或者对自我探索的深度追求。适度的多面性是适应力的表现，但如果差异过大，可能会让你感到内在冲突或身份困惑。建议尝试记录不同状态下的感受，寻找其中的连续性和核心特质。如果这种分裂感影响到日常生活或人际关系，可以考虑与心理咨询师交流，帮助你整合这些面向，找到更稳定的自我感。"
            },
            extreme: {
                emoji: "🌌",
                title: "高度多重人格倾向（61-80 分）",
                description: "测试结果显示你具有高度多重人格倾向。你可能经常感觉自己像'不同的人'，甚至有过'时间丢失'（不记得某段时间做了什么）或'这不是我做的'的体验。你的不同面向之间可能存在明显差异，甚至互相矛盾。这种情况可能源于创伤经历、长期压力，或天生的心理特质。需要说明的是，本测试仅为娱乐参考，不能作为临床诊断依据。但如果这种状态让你感到困扰、影响工作或人际关系，强烈建议寻求专业心理咨询师的帮助。专业的心理评估可以更好地理解你的状况，并提供适当的支持。记住，寻求帮助是勇敢的表现，你值得拥有更整合、更安宁的内心状态。"
            }
        };

        let currentQuestion = 0;
        let answers = [];
        let score = 0;

        // 激活测试
        function activateTest() {
            const code = document.getElementById('activationCode').value.trim();
            const errorMessage = document.getElementById('errorMessage');
            
            if (ACTIVATION_CODES.includes(code)) {
                errorMessage.style.display = 'none';
                document.getElementById('activationPage').classList.add('hidden');
                document.getElementById('testPage').style.display = 'block';
                loadQuestion();
            } else {
                errorMessage.style.display = 'block';
            }
        }

        // 加载题目
        function loadQuestion() {
            const question = QUESTIONS[currentQuestion];
            
            document.getElementById('questionNumber').textContent = `第 ${currentQuestion + 1} 题 / 共 ${QUESTIONS.length} 题`;
            document.getElementById('questionText').textContent = question.text;
            document.getElementById('progressFill').style.width = `${((currentQuestion) / QUESTIONS.length) * 100}%`;
            
            const optionsContainer = document.getElementById('optionsContainer');
            optionsContainer.innerHTML = '';
            
            const letters = ['A', 'B', 'C', 'D'];
            question.options.forEach((option, index) => {
                const optionDiv = document.createElement('div');
                optionDiv.className = 'option';
                optionDiv.onclick = () => selectOption(index);
                optionDiv.innerHTML = `
                    <div class="option-letter">${letters[index]}</div>
                    <div class="option-text">${option}</div>
                `;
                optionsContainer.appendChild(optionDiv);
            });
            
            document.getElementById('nextBtn').disabled = true;
        }

        // 选择选项
        function selectOption(index) {
            const options = document.querySelectorAll('.option');
            options.forEach((opt, i) => {
                opt.classList.remove('selected');
                if (i === index) {
                    opt.classList.add('selected');
                }
            });
            
            answers[currentQuestion] = index;
            document.getElementById('nextBtn').disabled = false;
        }

        // 下一题
        function nextQuestion() {
            score += (answers[currentQuestion] + 1);
            currentQuestion++;
            
            if (currentQuestion >= QUESTIONS.length) {
                showResult();
            } else {
                loadQuestion();
            }
        }

        // 显示结果
        function showResult() {
            document.getElementById('testPage').style.display = 'none';
            document.getElementById('resultPage').style.display = 'block';
            
            // 确定结果等级
            let result;
            if (score <= 30) {
                result = RESULTS.low;
            } else if (score <= 45) {
                result = RESULTS.medium;
            } else if (score <= 60) {
                result = RESULTS.high;
            } else {
                result = RESULTS.extreme;
            }
            
            // 设置 emoji
            document.getElementById('resultEmoji').textContent = result.emoji;
            
            // 动画显示分数
            let displayScore = 0;
            const scoreElement = document.getElementById('resultScore');
            const interval = setInterval(() => {
                if (displayScore >= score) {
                    clearInterval(interval);
                } else {
                    displayScore++;
                    scoreElement.textContent = displayScore;
                }
            }, 30);
            
            document.getElementById('resultTitle').textContent = result.title;
            document.getElementById('resultDescription').textContent = result.description;
        }

        // 重新测试
        function restartTest() {
            currentQuestion = 0;
            answers = [];
            score = 0;
            document.getElementById('resultPage').style.display = 'none';
            document.getElementById('activationPage').classList.remove('hidden');
            document.getElementById('activationCode').value = '';
        }

        // 支持回车键激活
        document.getElementById('activationCode').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                activateTest();
            }
        });
    </script>
</body>
</html>
